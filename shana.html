<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>刹那 App - 高保真原型</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 隐藏默认滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 全局自定义玻璃质感滑动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; margin-block: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
        
        /* 预制 IP 形象自定义动画 */
        @keyframes ip-sway { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
        @keyframes ip-float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes ip-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes ip-hop { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px) scaleY(1.05); } }
        @keyframes ip-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05) scaleX(1.02); } }
        @keyframes ip-float-up { 0% { transform: translateY(0) scale(0.8); opacity: 1; } 100% { transform: translateY(-20px) scale(1.2); opacity: 0; } }
        @keyframes ip-wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
        @keyframes ip-slide { 0%, 100% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }
        @keyframes ip-vibrate { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-2px, 1px); } 75% { transform: translate(2px, -1px); } }
        @keyframes ip-spin-sway { 0% { transform: rotate(0deg); } 50% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .anim-sway { animation: ip-sway 2s ease-in-out infinite; }
        .anim-float { animation: ip-float 3s ease-in-out infinite; }
        .anim-pulse-slow { animation: ip-pulse 2s infinite; }
        .anim-hop { animation: ip-hop 0.8s infinite; }
        .anim-breathe { animation: ip-breathe 4s ease-in-out infinite; }
        .anim-float-up { animation: ip-float-up 3s infinite; }
        .anim-float-up-delay { animation: ip-float-up 3s infinite 0.5s; }
        .anim-wiggle { animation: ip-wiggle 1.5s infinite; }
        .anim-slide { animation: ip-slide 2s ease-in-out infinite; }
        .anim-vibrate { animation: ip-vibrate 0.1s infinite; }
        .anim-spin-sway { animation: ip-spin-sway 6s ease-in-out infinite; }

        @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        .animate-blob { animation: blob 10s infinite alternate; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #ffffff; box-shadow: 0 0 10px rgba(0,0,0,0.3); margin-top: -4px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        @keyframes shatter-burst {
          0% { transform: translate3d(0,0,0) rotate(0deg) scale(1); opacity: 1; filter: brightness(2); }
          40% { opacity: 1; filter: brightness(1.5); }
          100% { transform: translate3d(var(--tx), var(--ty), var(--tz)) rotate3d(var(--rx), var(--ry), var(--rz), var(--deg)) scale(0); opacity: 0; filter: blur(4px); }
        }

        @keyframes spark-fall {
          0% { transform: translate3d(var(--sx), 0, 0) scale(1); opacity: 0; }
          15% { opacity: 1; transform: translate3d(var(--sx), 20vh, 0) scale(1.5); filter: brightness(2); }
          80% { opacity: 1; }
          100% { transform: translate3d(var(--ex), 120vh, 0) scale(0.5); opacity: 0; filter: blur(2px); }
        }

        @keyframes celebration-pop {
          0% { transform: scale(0.8) translateY(20px); opacity: 0; filter: blur(10px); }
          15% { transform: scale(1.1) translateY(0); opacity: 1; filter: blur(0px); }
          30% { transform: scale(1) translateY(0); }
          80% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0px); }
          100% { transform: scale(1.2) translateY(-20px); opacity: 0; filter: blur(10px); }
        }
        .animate-celebration-pop { animation: celebration-pop 2s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const App = () => {
          // --- 路由与全局状态 ---
          const [authState, setAuthState] = useState('login'); 
          const [activeTab, setActiveTab] = useState('当下');
          
          // --- 用户数据状态 ---
          const [userData, setUserData] = useState({
            year: '',
            month: '',
            day: '',
            age: '未设置',
            daysPassed: 0,
            joinedDays: 0
          });

          // --- 首页 & 动效状态 ---
          const [isCompleting, setIsCompleting] = useState(false);
          const [time, setTime] = useState(new Date());
          const [quoteIndex, setQuoteIndex] = useState(0);
          const [isPeeking, setIsPeeking] = useState(false);
          
          // --- 清单 & 成就状态 ---
          const [flippedAchievementCards, setFlippedAchievementCards] = useState({});
          const [flippedListCards, setFlippedListCards] = useState({}); 
          const [progressUpdates, setProgressUpdates] = useState({}); 
          const [isSettingsOpen, setIsSettingsOpen] = useState(false); 
          
          const [explosions, setExplosions] = useState([]);
          const [celebrationText, setCelebrationText] = useState(null);

          const maxPull = 320; 
          const startYList = useRef(0);
          const startPullOffset = useRef(0);
          const startScrollTop = useRef(0);
          const listScrollRef = useRef(null);
          const [pullOffset, setPullOffset] = useState(0);
          const [isDraggingList, setIsDraggingList] = useState(false);
          
          const [selectedWish, setSelectedWish] = useState(null);
          const [futureMsgInput, setFutureMsgInput] = useState('');
          const [newWishInput, setNewWishInput] = useState('');
          
          // 首次进入演示：默认普通愿望清单为空
          const [myWishes, setMyWishes] = useState([]);

          // 人生轨迹（常驻累计卡片）状态
          const [lifeStats, setLifeStats] = useState([
            { id: 'stat_book', type: 'book', title: '阅读好书', count: 0, unit: '本', lastItem: '', colorClass: 'text-rose-400', bgClass: 'bg-rose-400', hoverBorder: 'group-hover:border-rose-400' },
            { id: 'stat_movie', type: 'movie', title: '观看电影', count: 0, unit: '部', lastItem: '', colorClass: 'text-indigo-400', bgClass: 'bg-indigo-400', hoverBorder: 'group-hover:border-indigo-400' },
            { id: 'stat_city', type: 'city', title: '旅行城市', count: 0, unit: '座', lastItem: '', colorClass: 'text-emerald-400', bgClass: 'bg-emerald-400', hoverBorder: 'group-hover:border-emerald-400' },
          ]);
          const [statInput, setStatInput] = useState({}); 

          const globalWishes = useMemo(() => {
            const rawString = "清晨散步,写生活札记,泡一杯茶,窗边读书,写一封信,拍一张景,阳台种草,夜空数星,日落停驻,记录当下,换季整理,手写清单,舒服泡澡,午后冥想,采花归家,挂灯串灯,小夜曲听,换一香氛,整理衣橱,早安打卡,温柔写字,自己庆祝,时光剪影,家里小吧,桌面种草,窗边咖啡,日常慢拍,写下一句话,细数当下,慢煮一餐,泡一本老书,摆一束花,烛光一晚,阳光晒席,留一张明信,记三今日事,晚安深呼吸,软毯下午,暖阳坐一会,写感恩清单,记录季节感,拍一分钟风,早起看云,昨日小结,留一句期许,随手绘一笔,一杯热巧克力,听雨落声音,整理照片集,写一次心情";
            let uniqueList = Array.from(new Set(
              rawString.split(',').map(w => w.trim()).filter(w => w.length > 0 && w.length <= 5)
            )).slice(0, 50);

            const numPoints = uniqueList.length;
            const r = 115;
            const goldenRatio = (1 + Math.sqrt(5)) / 2;
            const angleIncrement = Math.PI * 2 * goldenRatio;
            const dotColors = ['#94a3b8', '#a7f3d0', '#fbcfe8', '#cbd5e1', '#fde047', '#99f6e4', '#e2e8f0'];

            return uniqueList.map((text, i) => {
              const t = i / numPoints;
              const inclination = Math.acos(1 - 2 * (i + 0.5) / numPoints);
              const azimuth = angleIncrement * i;
              const x = r * Math.sin(inclination) * Math.cos(azimuth);
              const y = r * Math.sin(inclination) * Math.sin(azimuth);
              const z = r * Math.cos(inclination);
              const msgs = [
                "愿你在这一刻，找回内心的宁静。",
                "慢一点也没关系，我在未来等你。",
                "让时间在这一秒，为你停驻片刻。",
                "生活不仅仅是赶路，还有沿途的风景。",
                "每一个平凡的念想，都值得被温柔对待。"
              ];
              return { id: i, text, x, y, z, msg: msgs[i % msgs.length], color: dotColors[i % dotColors.length] };
            });
          }, []);

          const [rotation, setRotation] = useState({ x: 0, y: 0 });
          const spinRef = useRef({ vx: 0, vy: 0, lastX: 0, lastY: 0, isDragging: false, timestamp: 0 });
          
          const [startDate] = useState(new Date()); 
          const daysPassed = authState === 'authenticated' ? userData.daysPassed : 0; 
          const hoursPassed = Math.floor((time - startDate) / (1000 * 60 * 60)) || 0;

          const cheerMsgs = ["慢慢来，比较快。","哪怕只是一小步，也是前进。","今天的你，已经做得很好了。","给时间一点时间，给花开一点耐心。","享受过程，比到达终点更重要。"];
          const quotes = ["今天也温柔一点吧~", "慢慢来，好戏在后头。", "你是这世间最美好的刹那。", "每一个当下都值得被珍惜。", "不必赶路，去感受路。", "听，像素在跳动。", "心安处，即是归途。", "这一刻，你做得很棒。", "做一个安静的梦。", "记得给自己一个拥抱。"];

          useEffect(() => {
            let animationFrameId;
            const loop = () => {
              setTime(new Date());
              if (activeTab === '清单' && authState === 'authenticated') {
                const sr = spinRef.current;
                if (!sr.isDragging) {
                  sr.vx *= 0.95; sr.vy *= 0.95;
                  const baseSpeedX = 0.0025; const baseSpeedY = 0.007;
                  setRotation(prev => ({
                    x: prev.x + (Math.abs(sr.vx) > 0.0001 ? sr.vx : baseSpeedX),
                    y: prev.y + (Math.abs(sr.vy) > 0.0001 ? sr.vy : baseSpeedY)
                  }));
                }
              }
              animationFrameId = requestAnimationFrame(loop);
            };
            loop();
            return () => cancelAnimationFrame(animationFrameId);
          }, [activeTab, authState]);

          const handleCompleteOnboarding = () => {
            if (userData.year && userData.month && userData.day) {
              const birthDate = new Date(userData.year, userData.month - 1, userData.day);
              const now = new Date();
              const diffTime = Math.abs(now.getTime() - birthDate.getTime());
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
              
              let age = now.getFullYear() - birthDate.getFullYear();
              const m = now.getMonth() - birthDate.getMonth();
              if (m < 0 || (m === 0 && now.getDate() < birthDate.getDate())) {
                  age--;
              }

              setUserData(prev => ({ 
                ...prev, 
                age: age > 0 ? `${age}岁` : '未满周岁', 
                daysPassed: diffDays, 
                joinedDays: 1 
      }));
            } else {
              setUserData(prev => ({ ...prev, age: '未设置', daysPassed: 0, joinedDays: 1 }));
            }
            setAuthState('authenticated');
          };

          const handlePlanetPointerDown = (e) => {
            spinRef.current.isDragging = true;
            spinRef.current.lastX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            spinRef.current.lastY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            spinRef.current.timestamp = performance.now();
            spinRef.current.vx = 0; spinRef.current.vy = 0;
          };

          const handlePlanetPointerMove = (e) => {
            if (!spinRef.current.isDragging) return;
            if(e.cancelable) e.preventDefault(); 
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            const dx = clientX - spinRef.current.lastX;
            const dy = clientY - spinRef.current.lastY;
            
            const factor = 0.018; 
            setRotation(prev => ({ x: prev.x - dy * factor, y: prev.y + dx * factor }));
            
            spinRef.current.vx = -dy * 0.003;
            spinRef.current.vy = dx * 0.003;
            
            spinRef.current.lastX = clientX;
            spinRef.current.lastY = clientY;
          };

          const handlePlanetPointerUp = () => { spinRef.current.isDragging = false; };

          const handleListTouchStart = (e) => {
            if (activeTab !== '清单') return;
            if (pullOffset > 200 && e.touches[0].clientY < 450) return; 
            startYList.current = e.touches[0].clientY;
            startPullOffset.current = pullOffset;
            startScrollTop.current = listScrollRef.current ? listScrollRef.current.scrollTop : 0;
            setIsDraggingList(true);
          };

          const handleListTouchMove = (e) => {
            if (!isDraggingList || activeTab !== '清单') return;
            const currentY = e.touches[0].clientY;
            const diff = currentY - startYList.current;
            const isTouchingList = e.target.closest('.list-scroll-container');

            if (isTouchingList && startScrollTop.current > 0) {
              return; 
            }

            if (startPullOffset.current === 0 && diff < 0) {
              return;
            }

            if (diff > 0 || startPullOffset.current > 0) {
              let newOffset = startPullOffset.current + diff * 0.8;
              if (startPullOffset.current === 0) newOffset = Math.pow(diff, 0.85); 
              setPullOffset(Math.max(0, Math.min(newOffset, maxPull)));
            }
          };

          const handleListTouchEnd = () => { setIsDraggingList(false); if (pullOffset < 150) setPullOffset(0); };
          const handleAutoPull = () => setPullOffset(pullOffset > 0 ? 0 : maxPull);

          const handleAddWish = () => {
            if (!selectedWish) return;
            setMyWishes([{
              id: Date.now(), text: selectedWish.text, date: `${new Date().getFullYear()}.${(new Date().getMonth()+1).toString().padStart(2,'0')}.${new Date().getDate().toString().padStart(2,'0')}`, progress: 0, isExploded: false,
              futureMsg: futureMsgInput || `关于「${selectedWish.text}」，未来的你一定会感谢现在的期许。`
            }, ...myWishes]);
            setSelectedWish(null);
            setFutureMsgInput('');
            if (listScrollRef.current) {
              listScrollRef.current.scrollTo({ top: 0, behavior: 'smooth' });
            }
          };

          const handleAddCustomWish = () => {
            if (!newWishInput) return;
            setMyWishes([{
              id: Date.now(), text: newWishInput, date: `${new Date().getFullYear()}.${(new Date().getMonth()+1).toString().padStart(2,'0')}.${new Date().getDate().toString().padStart(2,'0')}`, progress: 0, isExploded: false,
              futureMsg: '自己写下的愿望，自己去实现。'
            }, ...myWishes]);
            setNewWishInput('');
            if (listScrollRef.current) {
              listScrollRef.current.scrollTo({ top: 0, behavior: 'smooth' });
            }
          };

          const handleIpToggle = () => {
            if (!isPeeking) { setQuoteIndex((prev) => (prev + 1) % quotes.length); setIsPeeking(true); } 
            else { setIsPeeking(false); }
          };

          const handleSaveProgress = (id) => {
            const newProgress = progressUpdates[id] !== undefined ? progressUpdates[id] : null;
            if (newProgress !== null) {
              setMyWishes(prev => prev.map(w => w.id === id ? { ...w, progress: newProgress } : w));
            }
            setFlippedListCards(prev => ({ ...prev, [id]: false }));
          };

          const triggerCelebration = (e, text, type = 'all') => {
            e.stopPropagation();
            const cardEl = e.currentTarget.closest('.perspective-1000') || e.currentTarget;
            const rect = cardEl ? cardEl.getBoundingClientRect() : { left: 20, top: 300, width: 340, height: 100 };
            const expId = 'exp_' + Date.now();

            const shards = type === 'all' ? Array.from({length: 35}).map(() => ({
              left: Math.random() * rect.width + 'px', top: Math.random() * rect.height + 'px',
              tx: (Math.random() - 0.5) * 800 + 'px', ty: (Math.random() - 0.5) * 800 + 'px', tz: (Math.random() * 600 - 200) + 'px',
              rx: Math.random(), ry: Math.random(), rz: Math.random(), deg: (Math.random() * 1080) + 'deg',
              w: (Math.random() * 40 + 10) + 'px', h: (Math.random() * 40 + 10) + 'px',
            })) : [];

            const sparks = Array.from({length: 80}).map(() => ({
              sx: (Math.random() * 390) + 'px', ex: (Math.random() * 390 + (Math.random() - 0.5) * 150) + 'px',
              delay: (Math.random() * 1.5 + 0.3) + 's', duration: (Math.random() * 2.5 + 2.5) + 's',
              color: ['#34d399', '#a7f3d0', '#fbcfe8', '#fde047', '#99f6e4', '#ffffff'][Math.floor(Math.random()*6)],
              size: (Math.random() * 4 + 2) + 'px'
            }));

            setExplosions(prev => [...prev, { id: expId, rect, shards, sparks }]);
            setCelebrationText(text);
            setTimeout(() => setCelebrationText(null), 2000); 
            setTimeout(() => { setExplosions(prev => prev.filter(exp => exp.id !== expId)); }, 5000);
          };

          const handleExplodeCard = (e, item) => {
            triggerCelebration(e, item.text, 'all');
            setMyWishes(prev => prev.map(w => w.id === item.id ? { ...w, isExploded: true, progress: 100 } : w));
          };

          const handleStatSubmit = (e, stat) => {
            e.stopPropagation();
            const val = statInput[stat.id];
            if (!val) {
              setFlippedListCards(prev => ({...prev, [stat.id]: false}));
              return;
            }
            setLifeStats(prev => prev.map(s => s.id === stat.id ? { ...s, count: s.count + 1, lastItem: val } : s));
            setStatInput(prev => ({...prev, [stat.id]: ''})); 
            setFlippedListCards(prev => ({...prev, [stat.id]: false})); 
            triggerCelebration(e, `新记录: ${val}`, 'sparks_only');
          };

          const project = (wish) => {
            const { x, y, z } = wish;
            const cosX = Math.cos(rotation.x); const sinX = Math.sin(rotation.x);
            const cosY = Math.cos(rotation.y); const sinY = Math.sin(rotation.y);
            const y1 = y * cosX - z * sinX; const z1 = y * sinX + z * cosX;
            const x2 = x * cosY + z1 * sinY; const z2 = -x * sinY + z1 * cosY;
            const focalLength = 400; const scale = focalLength / (focalLength + z2);
            const depthOpacity = Math.max(0.1, Math.min(1, (z2 + 160) / 200));
            const pullAlpha = Math.min(1, pullOffset / 180);
            return { sx: x2 * scale, sy: y1 * scale, scale, opacity: depthOpacity * pullAlpha, zIndex: Math.floor(z2 + 200), isFront: z2 > -20 };
          };

          const PixelIP = ({ isCheering = false, onClick, className = '', variant = 0 }) => {
            const renderBody = (eyeLeft = 'M42 55 h4 v4 h-4 z', eyeRight = 'M54 55 h4 v4 h-4 z') => (
              <>
                <rect x="0" y="0" width="100" height="100" fill="transparent" />
                <rect x="25" y="40" width="50" height="40" fill="#FFB7B2" />
                <rect x="20" y="50" width="5" height="25" fill="#FFB7B2" />
                <rect x="75" y="50" width="5" height="25" fill="#FFB7B2" />
                <rect x="30" y="30" width="10" height="10" fill="#FFB7B2" />
                <rect x="60" y="30" width="10" height="10" fill="#FFB7B2" />
                <path d={eyeLeft} fill="#2A2A2A" />
                <path d={eyeRight} fill="#2A2A2A" />
                <rect x="32" y="62" width="6" height="4" fill="#FF9AA2" opacity="0.6" />
                <rect x="62" y="62" width="6" height="4" fill="#FF9AA2" opacity="0.6" />
              </>
            );

            const variants = [
              { animClass: 'animate-bounce', content: (<>{renderBody()}<path d="M10 25 L15 15 L20 25 Z" fill="#FDBA74" className="animate-pulse" /><path d="M80 30 L85 20 L90 30 Z" fill="#FDBA74" className="animate-pulse" style={{ animationDelay: '0.3s' }} /></>) },
